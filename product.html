  <style>
    /* ── GALLERY ── */
    .gallery-wrap{position:relative;overflow:hidden;border-radius:16px;background:#f5f0ea;aspect-ratio:3/4;user-select:none;cursor:zoom-in}
    .gallery-track{display:flex;height:100%;transition:transform .35s cubic-bezier(.4,0,.2,1)}
    .gallery-slide{min-width:100%;height:100%;display:flex;align-items:center;justify-content:center;overflow:hidden}
    .gallery-slide img{width:100%;height:100%;object-fit:cover;pointer-events:none}
    .gallery-dots{display:flex;justify-content:center;gap:6px;margin-top:12px}
    .gallery-dot{width:7px;height:7px;border-radius:50%;background:#c9a87c;opacity:.35;transition:opacity .2s,transform .2s;cursor:pointer}
    .gallery-dot.active{opacity:1;transform:scale(1.3)}
    .gallery-arrow{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.8);border:none;border-radius:50%;width:40px;height:40px;font-size:22px;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:2;transition:background .2s;box-shadow:0 2px 8px rgba(0,0,0,.12)}
    .gallery-arrow:hover{background:#fff}
    .gallery-arrow--prev{left:10px}
    .gallery-arrow--next{right:10px}
    [dir="rtl"] .gallery-arrow--prev{left:auto;right:10px}
    [dir="rtl"] .gallery-arrow--next{right:auto;left:10px}

    /* ── FULLSCREEN LIGHTBOX ── */
    .lightbox{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:999;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s}
    .lightbox.open{opacity:1;pointer-events:all}
    .lightbox__img{max-width:92vw;max-height:90vh;border-radius:8px;object-fit:contain;transition:transform .3s}
    .lightbox__close{position:fixed;top:20px;right:24px;color:#fff;font-size:32px;cursor:pointer;line-height:1;z-index:1000;background:none;border:none}
    .lightbox__arrow{position:fixed;top:50%;transform:translateY(-50%);color:#fff;font-size:40px;cursor:pointer;background:none;border:none;padding:0 16px;z-index:1000;opacity:.7;transition:opacity .15s}
    .lightbox__arrow:hover{opacity:1}
    .lightbox__prev{left:0}
    .lightbox__next{right:0}
    [dir="rtl"] .lightbox__prev{left:auto;right:0}
    [dir="rtl"] .lightbox__next{right:auto;left:0}

    /* ── COLOR SWATCHES ── */
    .pd__colors{margin:20px 0 8px}
    .pd__label{font-size:13px;color:var(--cocoa-soft);margin-bottom:10px;font-weight:500}
    .pd__swatches{display:flex;flex-wrap:wrap;gap:10px}
    .swatch{width:38px;height:38px;border-radius:50%;border:3px solid transparent;cursor:pointer;transition:transform .15s,border-color .15s;position:relative;box-shadow:0 1px 4px rgba(0,0,0,.15)}
    .swatch.active{border-color:var(--cocoa);transform:scale(1.18)}
    .swatch-tooltip{position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--cocoa);color:#fff;font-size:11px;padding:3px 8px;border-radius:6px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s;z-index:10}
    .swatch:hover .swatch-tooltip{opacity:1}

    /* ── SIZE BUTTONS ── */
    .pd__sizes{margin:16px 0}
    .pd__size-btns{display:flex;flex-wrap:wrap;gap:8px}
    .size-btn{min-width:54px;padding:9px 14px;border:1.5px solid #d4c4b0;border-radius:30px;background:#fff;font-size:13px;font-family:inherit;cursor:pointer;transition:all .15s;text-align:center}
    .size-btn:hover{border-color:var(--cocoa)}
    .size-btn.active{background:var(--cocoa);color:#fff;border-color:var(--cocoa)}

    /* ── SUMMARY ── */
    .pd__summary{font-size:13px;color:var(--cocoa-soft);margin:8px 0 20px;min-height:20px}
    .pd__summary strong{color:var(--cocoa)}
  </style>

  /* ── State ── */
  var currentProduct = null;

  var currentSize = null;
  var galleryIdx = 0;

  /* ============================================================
     INIT — runs AFTER all scripts loaded
  ============================================================ */
  function initProduct() {
    var params = new URLSearchParams(window.location.search);
    var id = params.get('id') || 'model1';
    currentProduct = PRODUCTS.find(function(p){ return p.id === id; }) || PRODUCTS[0];
    currentColorIdx = 0;
    currentSize = null;
    renderProduct();
  }

  function renderProduct() {
    var lang = (typeof getLang === 'function') ? getLang() : 'ar';
    var name = lang === 'ar' ? currentProduct.nameAr : currentProduct.nameEn;
    document.title = name + ' — SERENA';
    document.getElementById('pd-title').textContent = name;
    document.getElementById('pd-breadcrumb-name').textContent = name;
    document.getElementById('pd-price').textContent = currentProduct.price;
    renderSwatches();
    selectColor(0);
  }

  /* ── SWATCHES ── */
  function renderSwatches() {
    var lang = (typeof getLang === 'function') ? getLang() : 'ar';
    var html = '';
    currentProduct.colors.forEach(function(c, i) {
      var name = lang === 'ar' ? c.nameAr : c.nameEn;
      html += '<div class="swatch' + (i===0?' active':'') + '" '
            + 'style="background:' + c.hex + '" '
            + 'onclick="selectColor(' + i + ')" title="' + name + '">'
            + '<span class="swatch-tooltip">' + name + '</span>'
            + '</div>';
    });
    document.getElementById('pd-swatches').innerHTML = html;
  }

  function selectColor(idx) {
    currentColorIdx = idx;
    currentSize = null;

    document.querySelectorAll('.swatch').forEach(function(el, i) {
      el.classList.toggle('active', i === idx);
    });

    var lang = (typeof getLang === 'function') ? getLang() : 'ar';
    var c = currentProduct.colors[idx];
    var colorName = lang === 'ar' ? c.nameAr : c.nameEn;

    document.getElementById('color-name-display').textContent = colorName;
    var colorInput = document.getElementById('order-color');
    if (colorInput) colorInput.value = colorName;

    renderSizes();
    galleryIdx = 0;
    renderGallery();
    updateSummary();
  }

  /* ── SIZES ── */
  function renderSizes() {
    var sizes = currentProduct.colors[currentColorIdx].sizes;
    var html = '';
    sizes.forEach(function(s) {
      html += '<button class="size-btn" onclick="selectSize(\'' + s + '\')">' + s + '</button>';
    });
    document.getElementById('pd-sizes').innerHTML = html;
  }

  function selectSize(s) {
    currentSize = s;
    document.querySelectorAll('.size-btn').forEach(function(btn) {
      btn.classList.toggle('active', btn.textContent.trim() === s);
    });
    var sel = document.getElementById('order-size');
    if (sel) {
      sel.innerHTML = currentProduct.colors[currentColorIdx].sizes
        .map(function(sz){ return '<option value="' + sz + '"' + (sz===s?' selected':'') + '>' + sz + '</option>'; })
        .join('');
    }
    updateSummary();
  }

  function updateSummary() {
    var lang = (typeof getLang === 'function') ? getLang() : 'ar';
    var c = currentProduct.colors[currentColorIdx];
    var colorName = lang === 'ar' ? c.nameAr : c.nameEn;
    var el = document.getElementById('pd-summary');
    if (!el) return;
    if (currentSize) {
      el.innerHTML = lang === 'ar'
        ? 'اخترتِ: <strong>' + colorName + '</strong> — مقاس <strong>' + currentSize + '</strong>'
        : 'Selected: <strong>' + colorName + '</strong> — Size <strong>' + currentSize + '</strong>';
    } else {
      el.innerHTML = lang === 'ar'
        ? 'اللون: <strong>' + colorName + '</strong> — اختاري المقاس'
        : 'Color: <strong>' + colorName + '</strong> — choose a size';
    }
  }

  /* ── GALLERY ── */
  function renderGallery() {
    var images = currentProduct.colors[currentColorIdx].images;
    var track = document.getElementById('gallery-track');
    var dots  = document.getElementById('gallery-dots');

    track.innerHTML = images.map(function(src, i) {
      return '<div class="gallery-slide">'
           + '<img src="' + src + '" alt="" '
           + 'onclick="openLightbox(' + i + ')" '
           + 'onerror="this.parentElement.innerHTML=\'<div style=&quot;width:100%;height:100%;background:' + currentProduct.colors[currentColorIdx].hex + '33;display:flex;align-items:center;justify-content:center;font-size:48px;&quot;>👗</div>\'">'
           + '</div>';
    }).join('');

    dots.innerHTML = images.map(function(_, i) {
      return '<div class="gallery-dot' + (i===0?' active':'') + '" onclick="goToSlide(' + i + ')"></div>';
    }).join('');

    goToSlide(0);
  }

  function goToSlide(i) {
    var images = currentProduct.colors[currentColorIdx].images;
    galleryIdx = Math.max(0, Math.min(i, images.length - 1));
    document.getElementById('gallery-track').style.transform = 'translateX(' + (galleryIdx * -100) + '%)';
    document.querySelectorAll('.gallery-dot').forEach(function(d, j) {
      d.classList.toggle('active', j === galleryIdx);
    });
  }

  function galleryNext() {
    var len = currentProduct.colors[currentColorIdx].images.length;
    goToSlide((galleryIdx + 1) % len);
  }
  function galleryPrev() {
    var len = currentProduct.colors[currentColorIdx].images.length;
    goToSlide((galleryIdx - 1 + len) % len);
  }

  /* ── TOUCH SWIPE ── */
  (function(){
    var startX = 0;
    var wrap = document.getElementById('gallery-wrap');
    wrap.addEventListener('touchstart', function(e){ startX = e.touches[0].clientX; }, {passive:true});
    wrap.addEventListener('touchend', function(e){
      var dx = e.changedTouches[0].clientX - startX;
      if (Math.abs(dx) > 40) { if (dx < 0) galleryNext(); else galleryPrev(); }
    });
  })();

  /* ── LIGHTBOX ── */
  function openLightbox(idx) {
    var images = currentProduct.colors[currentColorIdx].images;
    galleryIdx = idx;
    document.getElementById('lightbox-img').src = images[idx];
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function closeLightbox(e) {
    if (e.target === document.getElementById('lightbox')) closeLightboxBtn();
  }
  function closeLightboxBtn() {
    document.getElementById('lightbox').classList.remove('open');
    document.body.style.overflow = '';
  }
  function lightboxNext(e) {
    e.stopPropagation();
    var len = currentProduct.colors[currentColorIdx].images.length;
    galleryIdx = (galleryIdx + 1) % len;
    document.getElementById('lightbox-img').src = currentProduct.colors[currentColorIdx].images[galleryIdx];
  }
  function lightboxPrev(e) {
    e.stopPropagation();
    var len = currentProduct.colors[currentColorIdx].images.length;
    galleryIdx = (galleryIdx - 1 + len) % len;
    document.getElementById('lightbox-img').src = currentProduct.colors[currentColorIdx].images[galleryIdx];
  }
  document.addEventListener('keydown', function(e) {
    if (!document.getElementById('lightbox').classList.contains('open')) return;
    if (e.key === 'Escape') closeLightboxBtn();
    if (e.key === 'ArrowRight') lightboxNext({stopPropagation:function(){}});
    if (e.key === 'ArrowLeft')  lightboxPrev({stopPropagation:function(){}});
  });

  /* ── ORDER DRAWER ── */
  function openOrderDrawer() {
    var sizes = currentProduct.colors[currentColorIdx].sizes;
    var sel = document.getElementById('order-size');
    sel.innerHTML = sizes.map(function(s){
      return '<option value="' + s + '"' + (s===currentSize?' selected':'') + '>' + s + '</option>';
    }).join('');
    document.getElementById('order-drawer').classList.add('drawer--open');
    document.getElementById('order-overlay').classList.add('drawer__overlay--show');
  }
  function closeOrderDrawer() {
    document.getElementById('order-drawer').classList.remove('drawer--open');
    document.getElementById('order-overlay').classList.remove('drawer__overlay--show');
  }
  document.getElementById('order-overlay').addEventListener('click', closeOrderDrawer);
  document.getElementById('order-close').addEventListener('click', closeOrderDrawer);

  function updatePaymentNumber() {
    var payment = document.querySelector('input[name="payment"]:checked').value;
    var box = document.getElementById('payment-number');
    if (payment === 'InstaPay') {
      box.style.display = 'block';
      box.innerHTML = (typeof t==='function') ? t('order_instapay_msg') : 'InstaPay: <strong>XXXXXXXXXXX</strong>';
    } else if (payment === 'فودافون كاش') {
      box.style.display = 'block';
      box.innerHTML = (typeof t==='function') ? t('order_vodafone_msg') : 'Vodafone Cash: <strong>XXXXXXXXXXX</strong>';
    } else {
      box.style.display = 'none';
    }
  }

  /* ── GOOGLE SHEETS SUBMIT — UNCHANGED ── */
  document.getElementById('order-form').addEventListener('submit', function(e) {
    e.preventDefault();
    var payment = document.querySelector('input[name="payment"]:checked').value;
    var file = document.getElementById('order-screenshot').files[0];
    var lang = (typeof getLang==='function') ? getLang() : 'ar';
    var c = currentProduct.colors[currentColorIdx];

    function sendOrder(imageBase64, imageName) {
      var orderData = {
        name:      document.getElementById('order-name').value,
        phone:     document.getElementById('order-phone').value,
        address:   document.getElementById('order-address').value,
        size:      document.getElementById('order-size').value,
        color:     lang==='ar' ? c.nameAr : c.nameEn,
        payment:   payment,
        product:   lang==='ar' ? currentProduct.nameAr : currentProduct.nameEn,
        price:     currentProduct.price,
        image:     imageBase64,
        imageName: imageName
      };
      fetch('https://script.google.com/macros/s/AKfycbzQzDJVQb9ZqqDZ8By-OTTVe8qovapm6W8hrQjcDKL6qTfqChZqQj7UKjCnu-HJDk3nig/exec', {
        method:'POST', mode:'no-cors',
        headers:{'Content-Type':'text/plain;charset=utf-8'},
        body: JSON.stringify(orderData)
      }).then(function() {
        showToast((typeof t==='function') ? t('order_success') : 'تم إرسال طلبك 🤍');
        closeOrderDrawer();
        document.getElementById('order-form').reset();
      }).catch(function() {
        showToast((typeof t==='function') ? t('order_error') : 'حصل خطأ، حاولي تاني');
      });
    }

    if (file) {
      var reader = new FileReader();
      reader.onload = function() { sendOrder(reader.result.split(',')[1], file.name); };
      reader.readAsDataURL(file);
    } else {
      sendOrder('','');
    }
  });

  /* ── RUN — بعد ما كل الكود يتعرّف ── */
  initProduct();
  </script>
</body>
</html>
